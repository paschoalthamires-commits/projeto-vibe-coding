<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding - Gerador de Sites</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center p-8">

    <h1 class="text-4xl font-bold mb-4 text-blue-500">Vibe Coding</h1>
    <p class="mb-8 text-gray-400 text-center max-w-lg">Descreva o site que você deseja criar e nossa IA gerará uma prévia em segundos.</p>

    <div class="w-full max-w-4xl bg-gray-800 p-6 rounded-2xl shadow-2xl">
        <textarea id="promptInput" class="w-full bg-gray-700 p-4 rounded-xl border border-gray-600 focus:outline-none focus:border-blue-500 mb-4" rows="3" placeholder="Ex: Crie uma landing page para uma cafeteria com cores tons pastel..."></textarea>
        
        <div class="flex flex-col sm:flex-row gap-4">
            <!-- Botão de Executar -->
            <button id="btnExecutar" class="flex-1 bg-blue-600 hover:bg-blue-700 px-6 py-4 rounded-xl font-bold transition-all">
                GERAR PRÉVIA GRÁTIS
            </button>

            <!-- Seu Link do Mercado Pago -->
            <a href="https://mpago.la" target="_blank" class="flex-1 bg-green-600 hover:bg-green-700 px-6 py-4 rounded-xl font-bold text-center transition-all shadow-lg">
                🚀 BAIXAR CÓDIGO (R$ 10,00)
            </a>
        </div>
    </div>

    <!-- Área de Preview -->
    <div id="areaPreview" class="w-full max-w-6xl mt-12 bg-white rounded-xl overflow-hidden shadow-2xl h-[500px]">
        <div id="placeholderPreview" class="flex items-center justify-center h-full text-gray-500 bg-gray-800">
            A prévia do seu site aparecerá aqui...
        </div>
        <iframe id="previewFrame" class="w-full h-full hidden border-none"></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const state = { loading: false };
            const elements = {
                btnExecutar: document.getElementById('btnExecutar'),
                input: document.getElementById('promptInput'),
                frame: document.getElementById('previewFrame'),
                placeholder: document.getElementById('placeholderPreview')
            };

            function setLoading(isLoading) {
                state.loading = isLoading;
                elements.btnExecutar.disabled = isLoading;
                elements.btnExecutar.innerText = isLoading ? "GERANDO..." : "GERAR PRÉVIA GRÁTIS";
            }

            async function executar() {
                if (state.loading) return;
                const prompt = elements.input.value.trim();
                if (!prompt) return alert("Descreva o seu projeto!");

                setLoading(true);
                try {
                    const response = await fetch('/executar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt })
                    });
                    const data = await response.json();
                    
                    if (data.sucesso) {
                        elements.frame.srcdoc = data.codigo; // Mostra o código gerado direto no frame
                        elements.frame.classList.remove('hidden');
                        elements.placeholder.classList.add('hidden');
                    } else {
                        alert(data.erro || "Erro na geração");
                    }
                } catch (error) {
                    alert("Erro na conexão com o servidor.");
                } finally {
                    setLoading(false);
                }
            }

            elements.btnExecutar.addEventListener('click', executar);
        });
    </script>
</body>
</html>
